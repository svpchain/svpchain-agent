name: Release
# Build svpchain agent prebuilt binaries and publish them to this repo's GitHub Release
# for end users who prefer not to compile locally.
#
# Windows is intentionally omitted: the eth_secp256k1 signing path requires CGO/libsecp256k1;
# each target is built natively on macOS and Linux runners (no cross-compilation).
# See the Makefile build target for local builds.
#
# No extra secrets required: all module dependencies are public; publishing uses the default
# GITHUB_TOKEN (publish job needs contents:write).
on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # e.g. v1.0.1
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"  # e.g. v1.0.1-rc1
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v1.0.1). Defaults to the pushed tag."
        required: false
        default: ""

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: linux-amd64
            runner: ubuntu-latest
          # If your org does not provide arm64 Linux runners, use Docker/QEMU cross-build instead.
          - target: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Resolve version
        run: |
          v="${{ github.event.inputs.version }}"
          if [ -z "$v" ]; then v="${GITHUB_REF#refs/*/}"; fi
          echo "VERSION=$v" >> "$GITHUB_ENV"
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Install Node (Wails frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Install Linux GUI build deps
        if: startsWith(matrix.target, 'linux-')
        # Wails (WebView) needs GTK3 + WebKit2GTK; Ubuntu 24.04 ships webkit2gtk-4.1.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev
      - name: Build & stage signer (native CGO)
        if: matrix.target != 'darwin-arm64'
        # go.mod lives at the repo root; build the root main packages.
        # CGO is required (eth_secp256k1 uses the libsecp256k1 signing path);
        # each target is built natively on its runner — no cross-compilation. Tarballs go to dist/ for upload-artifact.
        # The GUI is a Wails (WebView) app: `wails build` compiles the Vue frontend + binary;
        # Ubuntu 24.04 ships webkit2gtk-4.1, so the webkit2_41 build tag is required.
        env:
          CGO_ENABLED: "1"
        run: |
          name="svpchain-mcp-${VERSION}-${{ matrix.target }}"
          gui="svpchain-gui-${VERSION}-${{ matrix.target }}"
          go build -mod=readonly -trimpath -o "${name}" ./cmd/svpchain-mcp
          ( cd cmd/svpchain-gui && wails build -clean -trimpath -tags webkit2_41 \
              -ldflags "-X github.com/svpchain/svpchain-agent/internal/desktop.Version=${VERSION#v}" )
          cp cmd/svpchain-gui/build/bin/svpchain-gui "${gui}"
          mkdir -p dist
          tar -czf "dist/${name}.tar.gz" "${name}"
          tar -czf "dist/${gui}.tar.gz" "${gui}"
      - name: Package macOS .app bundle
        if: matrix.target == 'darwin-arm64'
        env:
          CGO_ENABLED: "1"
        run: |
          # Single source of truth for .app packaging — avoids duplicate compiles with mismatched artifacts.
          ./scripts/package-macos-app.sh | tee /tmp/package-macos-app.log
          eval "$(grep -E '^(APP_DMG|APP_MACOS_BIN)=' /tmp/package-macos-app.log)"

          mkdir -p dist
          cp "$APP_DMG" dist/

          name="svpchain-mcp-${VERSION}-${{ matrix.target }}"
          gui="svpchain-gui-${VERSION}-${{ matrix.target }}"
          cp "$APP_MACOS_BIN/svpchain-mcp" "$name"
          cp "$APP_MACOS_BIN/svpchain-gui" "$gui"
          tar -czf "dist/${name}.tar.gz" "$name"
          tar -czf "dist/${gui}.tar.gz" "$gui"
          rm -f "$name" "$gui"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: svpchain-mcp-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve version
        run: |
          v="${{ github.event.inputs.version }}"
          if [ -z "$v" ]; then v="${GITHUB_REF#refs/*/}"; fi
          echo "VERSION=$v" >> "$GITHUB_ENV"
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *-macos.dmg > SHA256SUMS 2>/dev/null || sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: svpchain agent ${{ env.VERSION }}
          body: |
            Prebuilt `svpchain-mcp` and `svpchain-gui` binaries for macOS and Linux.

            - **svpchain-mcp** — stdio MCP signing service (for Cursor and other MCP clients)
            - **svpchain-gui** — graphical setup tool (import keys, generate MCP JSON)
            - **svpchain-agent-*-macos.dmg** — macOS app disk image (open the DMG, drag `svpchain agent.app` to Applications)

            Verify downloads against `SHA256SUMS` before use, for example:

                shasum -a 256 -c SHA256SUMS

            These binaries handle signing keys locally — download only from this Release page.
          files: |
            dist/*.tar.gz
            dist/*-macos.dmg
            dist/SHA256SUMS
